<!DOCTYPE html>
<html lang="ru" style="background:#050A14">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Авандок.Среда — Сингулярная Метрополия</title>
  <meta name="description" content="Третья нейронная сеть: мозг, галактика, ваша компания. Авандок.Среда выращивает синапсы организационного интеллекта."/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Авандок.Среда — Сингулярная Метрополия"/>
  <meta property="og:description" content="Третья нейронная сеть: мозг, галактика, ваша компания."/>
  <meta property="og:image" content="https://sreda-2-0.vercel.app/assets/og.png"/>
  <meta property="og:url" content="https://sreda-2-0.vercel.app/"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="stylesheet" href="assets/fonts/inter.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <link rel="stylesheet" href="assets/singular-theme.css"/>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg"/>
</head>
<body>
  <canvas id="neuroBg"></canvas>

  <div class="app">
    <!-- Верхняя панель -->
    <header class="topbar">
      <div class="brand" id="brandHome" title="На Пульс компании">
        <img src="assets/logo.svg" alt="Авандок.Среда" class="logo-img" width="38" height="38"/>
        <div class="brand-t">
          <b>АВАНДОК <span>СРЕДА</span></b>
          <small>Сингулярная Метрополия</small>
        </div>
      </div>

      <button class="cmd" id="cmdBtn">
        <span class="cmd-icon">◆</span>
        <span class="cmd-text">Отправить импульс…</span>
        <kbd>⌘K</kbd>
      </button>

      <div class="tb-right">
        <div class="meter" id="meterBtn" title="Открыть бюджеты ИИ"><b>₽184k</b><span>Синаптический вес · −8%</span></div>
        <div class="filial-sw" id="filialSw"></div>
        <div class="who" id="who"></div>
      </div>
    </header>

    <!-- Левый навигатор отделов -->
    <nav class="nav" id="nav"></nav>

    <!-- Рабочая область (меняет лицо под роль) -->
    <main class="stage" id="stage"></main>
  </div>

  <!-- Модалка глобальной постановки задачи -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <img src="assets/logo.svg" alt="Авандок.Среда" width="28" height="28"/>
        <h2>Отправить импульс Среде</h2>
      </div>
      <p>Опишите сигнал словами — оркестратор распределит его по нейронным кластерам и подберёт агентов.</p>
      <textarea id="taskText" placeholder="Напр.: запусти набор на позицию senior-backend…"></textarea>
      <div class="ex" id="mEx"></div>
      <div class="row">
        <button class="btn ghost" id="mClose">Отмена</button>
        <button class="btn go" id="mGo">Запустить импульс ▶</button>
      </div>
    </div>
  </div>

  <script src="assets/mock.js"></script>
  <script src="assets/avatars/manifest.js"></script>
  <script src="assets/icons.js"></script>
  <script src="assets/organism.js"></script>
  <script src="assets/rpg.js"></script>
  <script src="assets/neural.js"></script>
  <script src="assets/cortex.js"></script>
  <script src="assets/talent.js"></script>
  <script src="assets/people-gen.js"></script>
  <script src="assets/forge.js"></script>
  <script src="assets/app.js"></script>

  <!-- Singular Metropolis: neuron/galaxy background + label overrides -->
  <script>
  (function(){
    // ===== Canvas: Neuron/Galaxy Network Background =====
    const canvas = document.getElementById('neuroBg');
    const ctx = canvas.getContext('2d');
    let W, H, nodes = [];

    function resize(){
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Node{
      constructor(){
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - .5) * .2;
        this.vy = (Math.random() - .5) * .2;
        this.r = 1 + Math.random() * 2;
        this.pulse = Math.random() * Math.PI * 2;
        this.speed = .015 + Math.random() * .025;
      }
      update(){
        this.x += this.vx;
        this.y += this.vy;
        if(this.x < 0 || this.x > W) this.vx *= -1;
        if(this.y < 0 || this.y > H) this.vy *= -1;
        this.pulse += this.speed;
      }
      draw(){
        const glow = Math.sin(this.pulse) * .5 + .5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * (1 + glow * .5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(176,106,238,${.2 + glow * .3})`;
        ctx.fill();
      }
    }

    function initNodes(){
      nodes = [];
      const count = Math.min(80, Math.floor(W * H / 15000));
      for(let i = 0; i < count; i++) nodes.push(new Node());
    }
    initNodes();
    window.addEventListener('resize', initNodes);

    function drawConnections(){
      for(let i = 0; i < nodes.length; i++){
        for(let j = i + 1; j < nodes.length; j++){
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if(dist < 120){
            const alpha = (1 - dist / 120) * .1;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(176,106,238,${alpha})`;
            ctx.lineWidth = .4;
            ctx.stroke();
          }
        }
      }
    }

    function animate(){
      ctx.clearRect(0, 0, W, H);
      drawConnections();
      nodes.forEach(n => { n.update(); n.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    // ===== Label overrides for Singular Metropolis =====
    const LABELS = {
      'Пульс компании': 'Телескоп · когнитивная карта',
      'Дашборд компании': 'Наблюдательная консоль',
      'Оргструктура': 'Топология сети',
      'Передачи компании': 'Синаптические импульсы',
      'Проекты на ревью': 'Паттерны на валидацию',
      'С чего начать': 'Точка сингулярности',
      'Цифровой найм': 'Нейронный найм',
      'Цифровое производство': 'Изолированная среда',
      'Счета Среды': 'Энергетический баланс',
      'Штат цифровых сотрудников': 'Нейронный пул',
      'Бюджеты ИИ': 'Синаптический вес',
      'Маршрутизатор моделей': 'Аксонный коммутатор',
      'Аудит и доступ': 'Термодинамические ограничения',
      'Полная библиотека': 'Семантическая память',
      'Студия': 'Лаборатория потенциации',
      'Суперсила': 'Эмерджентность',
      'Путь': 'Траектория роста',
      'Контур': 'Периметр системы',
      'Мой ассистент': 'Персональный нейрон',
      'Рабочий стол': 'Локальный кластер',
      'Передачи': 'Синапсы',
      'Канал отдела': 'Фотонный канал',
      'Пульс отдела': 'Кластерная активность',
      'Умения и цифровые сотрудники': 'Рецепторы и нейроны',
      'Команда': 'Нейронный ансамбль',
      'Поставить задачу среде…': 'Отправить импульс…',
      'Запустить рой': 'Запустить импульс',
      'ИИ за неделю': 'Синаптический вес'
    };

    function applyLabels(){
      document.querySelectorAll('.ni-l, .cmd-text, .modal h2, .modal p, .meter span, .brand small').forEach(el => {
        const txt = el.textContent;
        for(const [old, neu] of Object.entries(LABELS)){
          if(txt.includes(old)){
            el.textContent = txt.replace(old, neu);
            break;
          }
        }
      });
    }

    // Apply after app initializes
    setTimeout(applyLabels, 500);
    setTimeout(applyLabels, 1500);
  })();
  </script>
</body>
</html>
