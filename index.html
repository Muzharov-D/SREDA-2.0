<!DOCTYPE html>
<html lang="ru" style="background:#121310">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Авандок Среда 2.0 — больше, чем результат</title>
  <meta name="description" content="Операционная среда компании на ИИ: 150 людей и 164 цифровых сотрудника в одном штате. Больше, чем результат."/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Авандок Среда 2.0"/>
  <meta property="og:description" content="Операционная среда компании на ИИ: люди и цифровые сотрудники в одном штате. Больше, чем результат."/>
  <meta property="og:image" content="https://sreda-2-0.vercel.app/assets/og.png"/>
  <meta property="og:url" content="https://sreda-2-0.vercel.app/"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="stylesheet" href="assets/fonts/inter.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg"/>
</head>
<body>
  <div class="app">
    <!-- Верхняя панель -->
    <header class="topbar">
      <div class="brand" id="brandHome" title="На Пульс компании">
        <img src="assets/logo.svg" alt="Авандок Среда 2.0" class="logo-img" width="38" height="38"/>
        <div class="brand-t">
          <b>АВАНДОК <span>СРЕДА 2.0</span></b>
          <small>Больше, чем результат</small>
        </div>
      </div>

      <button class="cmd" id="cmdBtn">
        <span class="cmd-icon">◆</span>
        <span class="cmd-text">Поставить задачу среде…</span>
        <kbd>⌘K</kbd>
      </button>

      <div class="tb-right">
        <div class="meter" id="meterBtn" title="Открыть бюджеты ИИ"><b>₽184k</b><span>ИИ за неделю · −8%</span></div>
        <div class="filial-sw" id="filialSw"></div>
        <div class="who" id="who"></div>
      </div>
    </header>

    <!-- Левый навигатор отделов -->
    <nav class="nav" id="nav"></nav>

    <!-- Рабочая область (меняет лицо под роль) -->
    <main class="stage" id="stage"></main>
  </div>

  <!-- Модалка глобальной постановки задачи -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <img src="assets/logo.svg" alt="Авандок Среда 2.0" width="28" height="28"/>
        <h2>Поставить задачу Среде</h2>
      </div>
      <p>Опишите задачу словами — оркестратор сам разберёт её на подзадачи, подберёт цифровых сотрудников и модели.</p>
      <textarea id="taskText" placeholder="Напр.: собери кампанию к запуску в четверг…"></textarea>
      <div class="ex" id="mEx"></div>
      <div class="row">
        <button class="btn ghost" id="mClose">Отмена</button>
        <button class="btn go" id="mGo">Запустить рой ▶</button>
      </div>
    </div>
  </div>

  <script src="assets/mock.js"></script>
  <script src="assets/avatars/manifest.js"></script>
  <script src="assets/icons.js"></script>
  <script src="assets/organism.js"></script>
  <script src="assets/rpg.js"></script>
  <script src="assets/neural.js"></script>
  <script src="assets/cortex.js"></script>
  <script src="assets/talent.js"></script>
  <script src="assets/people-gen.js"></script>
  <script src="assets/forge.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
