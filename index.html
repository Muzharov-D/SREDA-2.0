<!DOCTYPE html>
<html lang="ru" style="background:#121310">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>СРЕДА</title>
  <meta name="description" content="Операционная среда компании на ИИ: 150 людей и 164 цифровых сотрудника в одном штате."/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="СРЕДА"/>
  <meta property="og:description" content="Операционная среда компании на ИИ: люди и цифровые сотрудники в одном штате."/>
  <meta property="og:image" content="https://sreda-2-0.vercel.app/assets/og.png"/>
  <meta property="og:url" content="https://sreda-2-0.vercel.app/"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="stylesheet" href="assets/fonts/inter.css?v=25"/>
  <link rel="stylesheet" href="assets/styles.css?v=29"/>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg"/>
</head>
<body>
  <div class="app">
    <h1 class="sr-only">СРЕДА</h1>
    <!-- A11y: объявление смены экрана для скринридеров -->
    <div id="routeAnnounce" class="sr-only" role="status" aria-live="polite"></div>
    <!-- Верхняя панель -->
    <header class="topbar">
      <div class="brand" id="brandHome" title="На Пульс компании">
        <img src="assets/logo.svg" alt="СРЕДА" class="logo-img" width="38" height="38"/>
        <div class="brand-t">
          <b><span>СРЕДА</span></b>
        </div>
      </div>

      <button class="cmd" id="cmdBtn">
        <span class="cmd-icon">◆</span>
        <span class="cmd-text">Поставить задачу среде…</span>
        <kbd>⌘K</kbd>
      </button>

      <div class="tb-right">
        <button class="meter" id="meterBtn" type="button" aria-label="Открыть бюджеты ИИ"><b>₽184k</b><span>ИИ за неделю · −8%</span></button>
        <div class="filial-sw" id="filialSw"></div>
        <button class="who" id="who" type="button" aria-haspopup="menu" aria-label="Профиль и роль"></button>
      </div>
    </header>

    <!-- Левый навигатор отделов -->
    <nav class="nav" id="nav" aria-label="Основная навигация"></nav>

    <!-- Рабочая область (меняет лицо под роль) -->
    <main class="stage" id="stage"></main>
  </div>

  <!-- Модалка глобальной постановки задачи -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
      <div class="modal-head">
        <img src="assets/logo.svg" alt="" width="28" height="28"/>
        <h2 id="modalTitle">Поставить задачу Среде</h2>
      </div>
      <p id="modalDesc">Опишите задачу словами — оркестратор сам разберёт её на подзадачи, подберёт цифровых сотрудников и модели.</p>
      <label for="taskText" class="sr-only">Описание задачи для Среды</label>
      <textarea id="taskText" placeholder="Напр.: собери кампанию к запуску в четверг…"></textarea>
      <div class="ex" id="mEx"></div>
      <div class="row">
        <button class="btn ghost" id="mClose">Отмена</button>
        <button class="btn go" id="mGo">Запустить рой ▶</button>
      </div>
    </div>
  </div>

  <script src="assets/mock.js?v=25"></script>
  <script src="assets/avatars/manifest.js?v=25"></script>
  <script src="assets/icons.js?v=25"></script>
  <script src="assets/rpg.js?v=25"></script>
  <script src="assets/neural.js?v=25"></script>
  <script src="assets/cortex.js?v=25"></script>
  <script src="assets/talent.js?v=25"></script>
  <script src="assets/people-gen.js?v=25"></script>
  <script src="assets/forge.js?v=25"></script>
  <script src="assets/org-kam.js?v=29"></script>
  <script src="assets/organism.js?v=27"></script>
  <script src="assets/app.js?v=30"></script>
  <script src="assets/dw-loop.js?v=25"></script>
  <!-- KAM v2: вход через опрос → динамическая сборка Среды (заменяет kam-pulse/kam-project/kam-assist) -->
  <script src="assets/kam2.js?v=39"></script>
</body>
</html>
