<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- АВАНДОК СРЕДА 2.0 · гексаэдр с изумрудным ядром -->
  <g stroke="#f1f0ea" stroke-width="1.3" stroke-linejoin="round">
    <!-- внешний гексагон -->
    <path d="M20 3 L34.7 11.5 L34.7 28.5 L20 37 L5.3 28.5 L5.3 11.5 Z" stroke-opacity=".92"/>
    <!-- внутренний гексагон -->
    <path d="M20 10.5 L28.2 15.25 L28.2 24.75 L20 29.5 L11.8 24.75 L11.8 15.25 Z" stroke-opacity=".45" stroke-width="1"/>
    <!-- рёбра куба: внешние вершины → внутренние -->
    <g stroke-opacity=".55" stroke-width="1">
      <path d="M20 3 L20 10.5"/>
      <path d="M34.7 11.5 L28.2 15.25"/>
      <path d="M34.7 28.5 L28.2 24.75"/>
      <path d="M20 37 L20 29.5"/>
      <path d="M5.3 28.5 L11.8 24.75"/>
      <path d="M5.3 11.5 L11.8 15.25"/>
    </g>
  </g>
  <!-- изумрудное ядро -->
  <circle cx="20" cy="20" r="6.5" fill="#36c994" fill-opacity=".14">
    <animate attributeName="r" values="5.5;7.5;5.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="20" r="3.4" fill="#36c994">
    <animate attributeName="fill-opacity" values="1;.72;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
