<!DOCTYPE html>
<html lang="ru" style="background:#121310">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Платформа Среды — найм агентов и производство под ключ</title>
  <meta name="description" content="Возьмите цифрового агента за 4 минуты или закажите продукт под ключ — без внедрения и без большого продукта. Inside подключите, когда дорастёте."/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Платформа Среды — внешний контур"/>
  <meta property="og:description" content="Цифровой найм и цифровое производство без внедрения. Оплата за результат."/>
  <meta property="og:image" content="https://sreda-2-0.vercel.app/assets/og.png"/>
  <meta property="og:url" content="https://sreda-2-0.vercel.app/portal.html"/>
  <link rel="stylesheet" href="assets/fonts/inter.css?v=2"/>
  <link rel="stylesheet" href="assets/styles.css?v=2"/>
  <link rel="stylesheet" href="assets/portal.css?v=2"/>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg"/>
</head>
<body>
  <div class="app">
    <h1 class="sr-only">Платформа Среды</h1>
    <div id="routeAnnounce" class="sr-only" role="status" aria-live="polite"></div>
    <header class="topbar">
      <div class="brand" id="brandHome" title="Платформа Среды">
        <img src="assets/logo.svg" alt="Платформа Среды" class="logo-img" width="38" height="38"/>
        <div class="brand-t">
          <b>ПЛАТФОРМА <span>СРЕДЫ</span></b>
          <small>Найм и производство · без внедрения</small>
        </div>
      </div>
      <button class="cmd" id="cmdBtn">
        <span class="cmd-icon">◆</span>
        <span class="cmd-text">Поставить задачу среде…</span>
        <kbd>⌘K</kbd>
      </button>
      <div class="tb-right">
        <button class="meter" id="meterBtn" type="button" aria-label="Счета Среды"><b>₽184k</b><span>счета платформы</span></button>
        <div class="filial-sw" id="filialSw"></div>
        <button class="who" id="who" type="button" aria-haspopup="menu" aria-label="Профиль и роль"></button>
      </div>
    </header>
    <nav class="nav" id="nav" aria-label="Основная навигация"></nav>
    <main class="stage" id="stage"></main>
  </div>
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
      <div class="modal-head">
        <img src="assets/logo.svg" alt="" width="28" height="28"/>
        <h2 id="modalTitle">Поставить задачу Среде</h2>
      </div>
      <p id="modalDesc">Опишите задачу словами — подберём агента и вернём результат. Платите только за принятое.</p>
      <label for="taskText" class="sr-only">Описание задачи для Среды</label>
      <textarea id="taskText" placeholder="Напр.: разбор воронки регистраций за май…"></textarea>
      <div class="ex" id="mEx"></div>
      <div class="row">
        <button class="btn ghost" id="mClose">Отмена</button>
        <button class="btn go" id="mGo">Подобрать агента ▶</button>
      </div>
    </div>
  </div>
  <script>window.__PORTAL = true;</script>
  <script src="assets/mock.js?v=2"></script>
  <script src="assets/avatars/manifest.js?v=2"></script>
  <script src="assets/icons.js?v=2"></script>
  <script src="assets/organism.js?v=2"></script>
  <script src="assets/rpg.js?v=2"></script>
  <script src="assets/neural.js?v=2"></script>
  <script src="assets/cortex.js?v=2"></script>
  <script src="assets/talent.js?v=2"></script>
  <script src="assets/people-gen.js?v=2"></script>
  <script src="assets/forge.js?v=2"></script>
  <script src="assets/portal-nav.js?v=2"></script>
  <script src="assets/portal-chat.js?v=2"></script>
  <script src="assets/portal-app.js?v=2"></script>
</body>
</html>
